<!doctype html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

  <title>Gratis demo först + 10 % rabatt | Webutvecklare.se</title>
  <meta name="description" content="Få en gratis demo först. Spara din rabattkod och använd den om du väljer att gå vidare." />
  <meta name="robots" content="noindex,nofollow" />

  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap">

  <style>
    body{
      margin:0;
      font-family:Inter, sans-serif;
      background:#f4eeea;
      color:#231d1a;
    }

    .container{
      max-width:900px;
      margin:auto;
      padding:20px;
    }

    h1{
      font-size:42px;
      line-height:1.1;
      margin-bottom:10px;
    }

    p{
      font-size:18px;
      line-height:1.6;
      color:#4f4742;
    }

    .card{
      background:#fff;
      padding:30px;
      border-radius:20px;
      margin-top:30px;
      box-shadow:0 10px 30px rgba(0,0,0,0.08);
      text-align:center;
    }

    .code{
      font-size:40px;
      font-weight:800;
      margin:20px 0;
      background:#f7f0ec;
      padding:15px;
      border-radius:12px;
      word-break:break-all;
    }

    .btn{
      display:inline-block;
      padding:14px 20px;
      border-radius:999px;
      font-weight:700;
      margin-top:10px;
      cursor:pointer;
      border:none;
    }

    .primary{
      background:#d98672;
      color:#fff;
    }

    input, textarea{
      width:100%;
      padding:12px;
      margin-top:10px;
      border-radius:10px;
      border:1px solid #ddd;
      font-size:16px;
      box-sizing:border-box;
    }

    textarea{
      min-height:120px;
      resize:vertical;
    }

    form{
      margin-top:20px;
      text-align:left;
    }

    small{
      display:block;
      margin-top:10px;
      color:#6d625c;
    }

    .status{
      margin-top:12px;
      font-size:14px;
      font-weight:600;
      color:#4f4742;
    }

    iframe{
      display:none;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>Gratis demo först</h1>
  <p>
    Börja med en demo. Du köper inget nu.
    Spara koden och använd den endast om du vill gå vidare.
  </p>

  <div class="card">
    <div>Din rabattkod</div>
    <div class="code" id="code">LADDAR...</div>

    <button class="btn primary" type="button" onclick="copyCode()">Kopiera kod</button>
  </div>

  <div class="card">
    <h2>Be om demo</h2>

    <form
      id="demoForm"
      action="https://script.google.com/macros/s/AKfycbytKkLx2dAZ8CR2O37uQkeFF-LIeFOVUJTPUDn6Y5VE_HMJVt_cI321W5VLHWIP_Lws/exec"
      method="GET"
      target="hidden_iframe"
    >
      <input type="hidden" name="Ref" id="refField">

      <label for="namn">Namn</label>
      <input id="namn" type="text" name="Namn" required>

      <label for="epost">E-post</label>
      <input id="epost" type="email" name="E-post" required>

      <label for="behov">Vad behöver du hjälp med?</label>
      <textarea id="behov" name="Behov" required></textarea>

      <label for="codeInput">Rabattkod</label>
      <input type="text" name="Kod" id="codeInput" required style="text-transform:uppercase;">

      <button class="btn primary" type="submit" id="submitBtn">Skicka</button>

      <div class="status" id="status"></div>

      <small>
        Rabattkoden används endast om du går vidare efter demon.
      </small>
    </form>

    <iframe name="hidden_iframe" id="hidden_iframe"></iframe>
  </div>

</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const code = (params.get("code") || "DEMO-0000").toUpperCase();
  const ref = params.get("ref") || "direkt";

  const form = document.getElementById("demoForm");
  const codeBox = document.getElementById("code");
  const codeInput = document.getElementById("codeInput");
  const refField = document.getElementById("refField");
  const status = document.getElementById("status");
  const submitBtn = document.getElementById("submitBtn");

  codeBox.textContent = code;
  codeInput.value = code;
  refField.value = ref;

  function copyCode() {
    navigator.clipboard.writeText(code);
    alert("Koden kopierad: " + code);
  }
  window.copyCode = copyCode;

  form.addEventListener("submit", function(e) {
    const inputCode = codeInput.value.trim().toUpperCase();

    if (inputCode !== code) {
      e.preventDefault();
      alert("Använd koden du fick via länken.");
      codeInput.focus();
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = "Skickar...";
    status.textContent = "Skickar...";

    setTimeout(function() {
      window.location.href = "https://webutvecklare.se/tack.html";
    }, 1500);
  });
</script>

</body>
</html>

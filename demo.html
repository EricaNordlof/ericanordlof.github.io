<!doctype html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

  <title>Gratis demo först + 10 % rabatt | Webutvecklare.se</title>
  <meta name="description" content="Få en gratis demo först. Spara din rabattkod och använd den om du väljer att gå vidare." />
  <meta name="robots" content="noindex,nofollow" />

  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap">

  <style>
    body{
      margin:0;
      font-family:Inter, sans-serif;
      background:#f4eeea;
      color:#231d1a;
    }

    .container{
      max-width:900px;
      margin:auto;
      padding:20px;
    }

    h1{
      font-size:42px;
      line-height:1.1;
      margin-bottom:10px;
    }

    p{
      font-size:18px;
      line-height:1.6;
      color:#4f4742;
    }

    .card{
      background:#fff;
      padding:30px;
      border-radius:20px;
      margin-top:30px;
      box-shadow:0 10px 30px rgba(0,0,0,0.08);
      text-align:center;
    }

    .code{
      font-size:40px;
      font-weight:800;
      margin:20px 0;
      background:#f7f0ec;
      padding:15px;
      border-radius:12px;
      word-break:break-all;
    }

    .btn{
      display:inline-block;
      padding:14px 20px;
      border-radius:999px;
      font-weight:700;
      margin-top:10px;
      cursor:pointer;
      border:none;
    }

    .primary{
      background:#d98672;
      color:#fff;
    }

    input, textarea{
      width:100%;
      padding:12px;
      margin-top:10px;
      border-radius:10px;
      border:1px solid #ddd;
      font-size:16px;
    }

    form{
      margin-top:20px;
      text-align:left;
    }

    small{
      display:block;
      margin-top:10px;
      color:#6d625c;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>Gratis demo först</h1>
  <p>
    Börja med en demo. Du köper inget nu.
    Spara koden och använd den endast om du vill gå vidare.
  </p>

  <div class="card">
    <div>Din rabattkod</div>
    <div class="code" id="code">LADDAR...</div>

    <button class="btn primary" onclick="copyCode()">Kopiera kod</button>
  </div>

  <div class="card">
    <h2>Be om demo</h2>

    <form action="https://formsubmit.co/erica@webutvecklare.se" method="POST">

      <input type="hidden" name="_subject" value="Ny demo via affiliate" />
      <input type="hidden" name="_template" value="table" />
      <input type="hidden" name="_captcha" value="false" />
      <input type="hidden" name="_next" value="https://webutvecklare.se/tack.html" />

      <input type="hidden" name="Källa" id="refField" />

      <label>Namn</label>
      <input type="text" name="Namn" required>

      <label>E-post</label>
      <input type="email" name="E-post" required>

      <label>Vad behöver du hjälp med?</label>
      <textarea name="Behov" required></textarea>

      <label>Rabattkod</label>
      <input type="text" name="Kod" id="codeInput" required style="text-transform:uppercase;">

      <button class="btn primary" type="submit">Skicka</button>

      <small>
        Rabattkoden används endast om du går vidare efter demon.
      </small>
    </form>
  </div>

</div>

<script>
  const params = new URLSearchParams(window.location.search);

  const code = (params.get("code") || "DEMO-0000").toUpperCase();
  const ref = params.get("ref") || "direkt";

  // Sätt UI
  document.getElementById("code").textContent = code;
  document.getElementById("codeInput").value = code;
  document.getElementById("refField").value = ref;

  // Lägg till tracking i mail
  const form = document.querySelector("form");

  if (form) {
    const hiddenCode = document.createElement("input");
    hiddenCode.type = "hidden";
    hiddenCode.name = "Affiliate kod";
    hiddenCode.value = code;
    form.appendChild(hiddenCode);

    const hiddenRef = document.createElement("input");
    hiddenRef.type = "hidden";
    hiddenRef.name = "Ref";
    hiddenRef.value = ref;
    form.appendChild(hiddenRef);
  }

  // Copy funktion
  function copyCode(){
    navigator.clipboard.writeText(code);
    alert("Koden kopierad: " + code);
  }
  window.copyCode = copyCode;

  // Validering
  document.querySelector("form").addEventListener("submit", function(e){
    const input = document.getElementById("codeInput").value.trim().toUpperCase();

    if(input !== code){
      e.preventDefault();
      alert("Använd koden du fick via länken.");
    }
  });
</script>

</body>
</html>

<div class="section-block">
  <h2>Exempel på hemsidor ni gillar</h2>
  <p class="hint">
    Skicka gärna länkar till hemsidor ni vill efterlikna på något sätt.
    Det kan vara färger, känsla, struktur, bilder, textstil eller hur sidan är uppbyggd.
  </p>

  <div class="form-grid" style="margin-top:18px;">
    <div class="full">
      <label for="inspirationUrls">URL-adress till hemsida/hemsidor ni gillar</label>
      <textarea id="inspirationUrls" name="inspirationUrls" placeholder="Ex. https://exempelsida.se/&#10;https://annanhemsida.se/"></textarea>
    </div>

    <div class="full">
      <label for="inspirationLikes">Vad vill ni efterlikna från dessa sidor?</label>
      <textarea id="inspirationLikes" name="inspirationLikes" placeholder="Ex. färgerna, lugnet, bildspråket, tydligheten, menyn, kontaktflödet, premiumkänslan..."></textarea>
    </div>

    <div class="full">
      <label for="inspirationAvoid">Finns något ni inte vill efterlikna?</label>
      <textarea id="inspirationAvoid" name="inspirationAvoid" placeholder="Ex. för stel känsla, för mycket text, för mörk design, för säljigt, för rörigt..."></textarea>
    </div>
  </div>
</div>
